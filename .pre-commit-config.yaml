repos:
  # ── General hygiene ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: ^frontend/tsconfig.*\.json$  # tsconfig allows trailing commas
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

  # ── Secrets detection ──
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks

  # ── Python: lint + format ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(backend|functions)/
      - id: ruff-format
        files: ^(backend|functions)/

  # ── Python: type checking ──
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        files: ^backend/src/
        additional_dependencies: [fastapi>=0.135.0, pydantic>=2.12.0, pydantic-settings>=2.13.0, httpx>=0.28.0, azure-storage-blob>=12.25.0, azure-cosmos>=4.9.0, openai>=1.82.0]
        args: [--strict, --python-version=3.12]

  # ── Frontend: lint + typecheck ──
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && npx eslint --max-warnings=0 "${@#frontend/}"' --
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        types: [file]
      - id: tsc
        name: tsc
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        types: [file]
        pass_filenames: false
