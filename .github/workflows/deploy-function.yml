name: Deploy Function App

# NOTE: Auto-deploy is disabled because the Polimi student subscription
# redacts all publishing credentials. Deploy manually with:
#
#   # 1. Build deployment zip (from project root)
#   docker run --rm -v /tmp/fn_pkgs:/output python:3.12-slim bash -c \
#     "pip install -q -t /output azure-functions 'azure-cosmos>=4.9.0' \
#      'azure-storage-blob>=12.25.0' 'openai>=1.82.0' 'numpy>=2.0.0' fastembed"
#
#   mkdir -p /tmp/fn-bundle/.python_packages/lib/site-packages
#   cp -r /tmp/fn_pkgs/* /tmp/fn-bundle/.python_packages/lib/site-packages/
#   cp functions/benchmark/function_app.py /tmp/fn-bundle/
#   cp functions/benchmark/host.json /tmp/fn-bundle/
#   cp functions/benchmark/requirements.txt /tmp/fn-bundle/
#   cd /tmp/fn-bundle && zip -qr /tmp/function.zip . -x "*.pyc" -x "*/__pycache__/*"
#
#   # 2. Deploy (requires `az login`)
#   az functionapp deployment source config-zip \
#     --name embed-benchmark-fn-swe --resource-group EmbedMatch \
#     --src /tmp/function.zip

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Bundle Python packages (fastembed + ONNX Runtime)
        run: |
          pip install -q -t fn_pkgs \
            azure-functions \
            "azure-cosmos>=4.9.0" \
            "azure-storage-blob>=12.25.0" \
            "openai>=1.82.0" \
            "numpy>=2.0.0" \
            fastembed

      - name: Build deployment zip
        run: |
          mkdir -p fn-bundle/.python_packages/lib/site-packages
          cp -r fn_pkgs/* fn-bundle/.python_packages/lib/site-packages/
          cp functions/benchmark/function_app.py fn-bundle/
          cp functions/benchmark/host.json fn-bundle/
          cp functions/benchmark/requirements.txt fn-bundle/
          cd fn-bundle && zip -r ../function.zip . -x "*.pyc" -x "*/__pycache__/*"
          ls -lh ../function.zip

      - name: Deploy via Kudu zip deploy
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTION_PUBLISH_PROFILE }}
        run: |
          python3 -c "
          import os, xml.etree.ElementTree as ET
          root = ET.fromstring(os.environ['PUBLISH_PROFILE'])
          p = root.find('.//publishProfile[@publishMethod=\"MSDeploy\"]')
          host = p.get('publishUrl').replace(':443', '')
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'SCM_HOST={host}\n')
              f.write(f'KUDU_CREDS={p.get(\"userName\")}:{p.get(\"userPWD\")}\n')
          "
      - name: Push to Kudu
        run: |
          curl -sf -X POST \
            "https://${SCM_HOST}/api/zipdeploy" \
            -u "${KUDU_CREDS}" \
            --data-binary @function.zip \
            -H "Content-Type: application/zip"
