name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Generate requirements.txt
        working-directory: backend
        run: uv pip compile pyproject.toml -o requirements.txt

      - name: Zip backend
        run: |
          cd backend
          zip -r ../backend.zip . \
            -x ".venv/*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x "uv.lock" \
            -x "tests/*"

      - name: Deploy via Kudu zip deploy
        run: |
          # Extract SCM credentials from publish profile XML
          CREDS=$(echo '${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}' | \
            python3 -c "
          import sys, xml.etree.ElementTree as ET
          root = ET.fromstring(sys.stdin.read())
          p = root.find('.//publishProfile[@publishMethod=\"MSDeploy\"]')
          print(f\"{p.get('userName')}:{p.get('userPWD')}\")
          ")
          # Use Kudu zip deploy (triggers Oryx build / pip install)
          curl -sf -X POST \
            "https://embed-match-web.scm.azurewebsites.net/api/zipdeploy" \
            -u "$CREDS" \
            --data-binary @backend.zip \
            -H "Content-Type: application/zip"
