name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Generate requirements.txt
        working-directory: backend
        run: uv pip compile pyproject.toml -o requirements.txt

      - name: Zip backend
        run: |
          cd backend
          zip -r ../backend.zip . \
            -x ".venv/*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x "uv.lock" \
            -x "tests/*"

      - name: Deploy via Kudu zip deploy
        run: |
          # Extract SCM credentials and URL from publish profile XML
          eval "$(echo '${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}' | \
            python3 -c "
          import sys, xml.etree.ElementTree as ET
          root = ET.fromstring(sys.stdin.read())
          p = root.find('.//publishProfile[@publishMethod=\"MSDeploy\"]')
          user = p.get('userName')
          pwd = p.get('userPWD')
          url = p.get('publishUrl')
          print(f'KUDU_USER=\"{user}\"')
          print(f'KUDU_PASS=\"{pwd}\"')
          print(f'SCM_HOST=\"{url}\"')
          ")"
          # Use Kudu zip deploy (triggers Oryx build / pip install)
          curl -sf -X POST \
            "https://${SCM_HOST}/api/zipdeploy" \
            -u "${KUDU_USER}:${KUDU_PASS}" \
            --data-binary @backend.zip \
            -H "Content-Type: application/zip"
